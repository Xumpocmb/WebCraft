{% load static %}
<section id="contacts" class="py-20 bg-logo-cream">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-3xl lg:text-4xl font-bold text-center text-gray-900 mb-12 fade-in">
      Свяжитесь с <span class="text-logo-purple">нами</span>
    </h2>
    <form id="contact-form" class="bg-white p-8 rounded-lg shadow-sm fade-in">
      <div class="mb-4">
        <label for="name" class="block text-gray-700 mb-2">Имя</label>
        <input id="name" name="name"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
          type="text" required />
        <p id="name-error" class="text-red-600 mt-1 hidden">Имя обязательно</p>
      </div>
      <div class="mb-4">
        <label for="contact" class="block text-gray-700 mb-2">Телефон или Email</label>
        <input id="contact" name="contact"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
          type="text" required />
        <p id="contact-error" class="text-red-600 mt-1 hidden">Телефон или email обязателен</p>
      </div>
      <div class="mb-6">
        <label for="message" class="block text-gray-700 mb-2">Сообщение</label>
        <textarea id="message" name="message"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
          rows="4" required></textarea>
        <p id="message-error" class="text-red-600 mt-1 hidden">Сообщение обязательно</p>
      </div>
      <div class="text-center">
        <button type="submit"
          class="bg-gradient-to-r from-logo-aqua to-logo-purple text-white rounded-lg transition-all font-semibold cta-button cta-sm">Отправить
          заявку</button>
      </div>
    </form>
  </div>
</section>
