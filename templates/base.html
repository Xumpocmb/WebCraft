{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="{% static "img/favicon.svg" %}" />
  <title>WebCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="generator" content="Meku" />
  <meta name="description" content="Лендинг IT-услуг, созданный с помощью Meku" />
  <meta name="author" content="Meku" />
  <meta property="og:title" content="Лендинг IT-услуг" />
  <meta property="og:description" content="Лендинг IT-услуг, созданный с помощью Meku" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://meku.dev/images/meku.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@meku_dev" />
  <meta name="twitter:image" content="https://meku.dev/images/meku.png" />
  <script type="module" src="{% static "js/main.js" %}"></script>
  <link rel="stylesheet" href="{% static "css/styles.css" %}">
</head>

<body>
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center">
          <div class="w-24 h-24 rounded-full border-2 border-logo overflow-hidden flex-shrink-0">
            <img src="{% static "img/logo.jpg" %}" alt="Логотип WebCraft" class="w-full h-full object-cover" />
          </div>
        </div>
        <nav class="hidden md:flex space-x-8">
          <button onclick="scrollToSection('home')"
            class="nav-link text-gray-700 hover:text-accent-turquoise transition-colors">Главная</button>
          <button onclick="scrollToSection('services')"
            class="nav-link text-gray-700 hover:text-accent-turquoise transition-colors">Услуги</button>
          <button onclick="scrollToSection('prices')"
            class="nav-link text-gray-700 hover:text-accent-turquoise transition-colors">Цены</button>
          <button onclick="scrollToSection('contacts')"
            class="nav-link text-gray-700 hover:text-accent-turquoise transition-colors">Контакты</button>
        </nav>
        <div class="hidden md:block">
          <button onclick="scrollToSection('contacts')"
            class="bg-gradient-to-r from-logo-aqua to-logo-purple text-white px-6 py-3 rounded-lg shadow-lg hover:shadow-xl transition-all font-semibold">Оставить
            заявку</button>
        </div>
        <button onclick="toggleMenu()" class="md:hidden p-2" aria-label="Переключить меню">
          <svg id="menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
    <div id="mobile-menu" class="md:hidden bg-white border-t hidden">
      <div class="px-4 py-4 space-y-4">
        <button onclick="scrollToSection('home')"
          class="nav-link w-full justify-start text-gray-700 hover:text-accent-turquoise transition-colors">Главная</button>
        <button onclick="scrollToSection('services')"
          class="nav-link w-full justify-start text-gray-700 hover:text-accent-turquoise transition-colors">Услуги</button>
        <button onclick="scrollToSection('prices')"
          class="nav-link w-full justify-start text-gray-700 hover:text-accent-turquoise transition-colors">Цены</button>
        <button onclick="scrollToSection('contacts')"
          class="nav-link w-full justify-start text-gray-700 hover:text-accent-turquoise transition-colors">Контакты</button>
        <button onclick="scrollToSection('contacts')"
          class="block bg-gradient-to-r from-logo-aqua to-logo-purple text-white px-6 py-3 rounded-lg shadow-lg hover:shadow-xl font-semibold w-full">Оставить
          заявку</button>
      </div>
    </div>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  {% include 'footer.html' %}

</body>

</html>
